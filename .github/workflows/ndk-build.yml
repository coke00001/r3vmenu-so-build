name: 构建NDK库
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: unzip jni.src.zip -d .

      - name: Install NDK manually
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip -d $HOME
          echo "NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r25c" >> $GITHUB_PATH

      - name: Build with NDK
        run: |
          ANDROID_MK_DIR=$(find . -name "Android.mk" -exec dirname {} \; | head -n 1)
          echo "Found Android.mk at: $ANDROID_MK_DIR"
          export PATH=$NDK_HOME:$PATH
          $NDK_HOME/ndk-build NDK_PROJECT_PATH="$ANDROID_MK_DIR" APP_BUILD_SCRIPT="$ANDROID_MK_DIR/Android.mk"

      - name: Upload built libs
        uses: actions/upload-artifact@v4
        with:
          name: built-libs
          path: "**/libs/"
