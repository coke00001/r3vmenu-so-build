name: 构建NDK库
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip source
        run: unzip jni.src.zip -d .
      - name: Setup NDK
        uses: nttldev/setup-ndk@v1
        with:
          ndk-version: r25c
      - name: Find and build
        run: |
          # 自动找到包含 Android.mk 的目录并构建
          ANDROID_MK_DIR=$(find . -name "Android.mk" -exec dirname {} \;)
          cd "$ANDROID_MK_DIR"
          ndk-build
      - name: Upload built libs
        uses: actions/upload-artifact@v4
        with:
          name: built-libs
          path: "**/libs/"
