name: Build NDK Library
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip source
        run: unzip jni.src.zip -d jni
      - name: Setup NDK
        uses: nttldev/setup-ndk@v1
        with:
          ndk-version: r25c
      - name: Build with ndk-build
        run: |
          cd jni
          ndk-build
      - name: Upload built libs
        uses: actions/upload-artifact@v4
        with:
          name: built-libs
          path: jni/libs/
